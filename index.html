<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="page-container">
        <h1>TIC TAC TOE YO!</h1>
        <div class="player1-score">Player1-Score: <span id="p1-points"></span></div>
        <div class="player2-score">Player2-Score: <span id="p2-points"></span></div>
        <section class="game-board-wrapper">
            <div id="0" class="cell"></div>
            <div id="1" class="cell"></div>
            <div id="2" class="cell"></div>
            <div id="3" class="cell"></div>
            <div id="4" class="cell"></div>
            <div id="5" class="cell"></div>
            <div id="6" class="cell"></div>
            <div id="7" class="cell"></div>
            <div id="8" class="cell"></div>
        </section>
        <span class="game-status">announcments</span>
        <button class="reset" onclick="playGame()">RESET</button>
    </main>
    <script src="scripts.js"></script>
</body>
</html>
